<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 8" preserveAspectRatio="none" role="img" aria-label="Animated divider">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4d6d" />
      <stop offset="35%" stop-color="#f59e0b" />
      <stop offset="70%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>
  <rect width="1200" height="8" fill="#0b1220" />
  <line x1="0" y1="4" x2="1200" y2="4" stroke="url(#gradient)" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="24 12">
    <animate attributeName="stroke-dashoffset" values="0;-72" dur="2s" repeatCount="indefinite" />
  </line>
</svg>
