<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Animated Excel Logo">
  <defs>
    <linearGradient id="bgExcel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="88" height="88" rx="16" fill="url(#bgExcel)" />

  <rect x="18" y="20" width="36" height="56" rx="6" fill="#107C41">
    <animate attributeName="x" values="18;17;18;19;18" dur="2.2s" repeatCount="indefinite" />
  </rect>
  <rect x="44" y="24" width="34" height="48" rx="4" fill="#21A366" />

  <text x="36" y="55" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">X</text>

  <g transform="translate(51,30)">
    <rect x="0" y="24" width="4" height="14" rx="1.5" fill="#c8f5dd">
      <animate attributeName="y" values="24;14;24" dur="1.6s" repeatCount="indefinite" />
      <animate attributeName="height" values="14;24;14" dur="1.6s" repeatCount="indefinite" />
    </rect>
    <rect x="8" y="20" width="4" height="18" rx="1.5" fill="#9ee8c5">
      <animate attributeName="y" values="20;11;20" dur="1.6s" begin="0.15s" repeatCount="indefinite" />
      <animate attributeName="height" values="18;27;18" dur="1.6s" begin="0.15s" repeatCount="indefinite" />
    </rect>
    <rect x="16" y="16" width="4" height="22" rx="1.5" fill="#72ddb0">
      <animate attributeName="y" values="16;8;16" dur="1.6s" begin="0.3s" repeatCount="indefinite" />
      <animate attributeName="height" values="22;30;22" dur="1.6s" begin="0.3s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
