<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Animated Power BI Logo">
  <defs>
    <linearGradient id="bgPbi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd84a" />
      <stop offset="100%" stop-color="#f2c811" />
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="88" height="88" rx="16" fill="url(#bgPbi)" />

  <g transform="translate(26,24)">
    <rect x="0" y="20" width="10" height="24" rx="5" fill="url(#gold)">
      <animate attributeName="y" values="20;12;20" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="height" values="24;32;24" dur="1.8s" repeatCount="indefinite" />
    </rect>
    <rect x="14" y="12" width="10" height="32" rx="5" fill="url(#gold)">
      <animate attributeName="y" values="12;6;12" dur="1.8s" begin="0.15s" repeatCount="indefinite" />
      <animate attributeName="height" values="32;38;32" dur="1.8s" begin="0.15s" repeatCount="indefinite" />
    </rect>
    <rect x="28" y="4" width="10" height="40" rx="5" fill="url(#gold)">
      <animate attributeName="y" values="4;0;4" dur="1.8s" begin="0.3s" repeatCount="indefinite" />
      <animate attributeName="height" values="40;44;40" dur="1.8s" begin="0.3s" repeatCount="indefinite" />
    </rect>
  </g>

  <circle cx="66" cy="28" r="3.5" fill="#ffd84a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.3s" repeatCount="indefinite" />
  </circle>
</svg>
