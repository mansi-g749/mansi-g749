<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Animated Gmail Logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect x="4" y="4" width="88" height="88" rx="16" fill="url(#bg)" />

  <g filter="url(#shadow)">
    <rect x="18" y="26" width="60" height="44" rx="8" fill="#ffffff">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0;0 -1.2;0 0;0 1.2;0 0"
        dur="2.4s"
        repeatCount="indefinite" />
    </rect>
  </g>

  <path d="M20 31 L48 52 L76 31" fill="none" stroke="#EA4335" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" values="0 120;120 0;0 120" dur="2.4s" repeatCount="indefinite" />
  </path>
  <path d="M20 31 L20 65" fill="none" stroke="#4285F4" stroke-width="6" stroke-linecap="round">
    <animate attributeName="opacity" values="0.65;1;0.65" dur="2.4s" repeatCount="indefinite" />
  </path>
  <path d="M76 31 L76 65" fill="none" stroke="#34A853" stroke-width="6" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.65;1" dur="2.4s" repeatCount="indefinite" />
  </path>
  <path d="M20 65 L48 45 L76 65" fill="none" stroke="#FBBC05" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="2.4s" repeatCount="indefinite" />
  </path>
</svg>
